<!DOCTYPE html>
<html lang="it-IT">

<head>
  <title>To do list</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
    integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css" />
  <script src="main.js" defer></script>

</head>

<body>
  <div id="loginWrapper">
    <form id="mioid" novalidate>
      <div class="input-wrapper">
        <label for="username">Username</label>
        <input type="text" name="username" value="" placeholder="username" required>
        <span class="error-handler"></span>
      </div>
      <div class="input-wrapper">
        <label for="password">Password</label>
        <input type="password" name="password" value="" placeholder="password" required>
        <span class="error-handler"></span>
      </div>
      <input  type="submit" value="Accedi">
    </form>
  </div>
  <div id="toDoList" class="container">
    <div id="loading"><span class="loader"></span></div>
    <div class="form-wrapper wrapper">
      <div>
        <input id="taskInput" placeholder="Nuovo task">
        <button id="addTaskBtn">Aggiungi</button>
      </div>

      <div class="filter">
        <button id="showAll">Tutti</button>
        <button id="showDone">Completati</button>
        <button id="showTodo">Da fare</button>
        <button id="sortAsc">Ordina da A a Z</button>
        <button id="sortDesc">Ordina da Z ad A</button>
      </div>
    </div>
    <div class="list-wrapper wrapper">
      <ul id="taskList"></ul>
    </div>
  </div>


</body>

</html>
